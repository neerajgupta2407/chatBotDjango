# Django Chatbot Nginx Configuration
# Place this file in /etc/nginx/sites-available/chatbot
# Then create symlink: sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/

upstream chatbot_app {
    server unix:/var/run/gunicorn/chatbot.sock fail_timeout=0;
}

# HTTP Server (redirect to HTTPS in production)
server {
    listen 80;
    listen [::]:80;
    server_name cb.hexbolttechnologies.in;  # UPDATE THIS

    # For Let's Encrypt SSL certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # OR keep HTTP for testing (remove after SSL setup)
    include /etc/nginx/sites-available/chatbot_common.conf;
}

