name: Test and Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
          SECRET_KEY: ci-test-secret-key
          ANTHROPIC_API_KEY: sk-ant-test
          OPENAI_API_KEY: sk-test
        run: python manage.py check

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
          SECRET_KEY: ci-test-secret-key
          ANTHROPIC_API_KEY: sk-ant-test
          OPENAI_API_KEY: sk-test
        run: python manage.py test --verbosity=2

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/chatbot

            TS=$(date +%Y%m%d_%H%M%S)
            mkdir -p /var/www/chatbot/backups
            PGPASSWORD=flKNVB5uxehxdtZZmCagxAkRTAMArmQ pg_dump -U chatbot_user -h localhost chatbot_db | gzip > /var/www/chatbot/backups/db_pre_deploy_${TS}.sql.gz

            cd /var/www/chatbot
            git fetch origin main
            git reset --hard origin/main

            venv/bin/pip install -r requirements.txt --quiet
            venv/bin/python manage.py migrate --noinput
            venv/bin/python manage.py collectstatic --noinput

            systemctl restart chatbot
            sleep 3
            systemctl is-active --quiet chatbot || (journalctl -u chatbot -n 30 --no-pager && exit 1)

            ls -t /var/www/chatbot/backups/db_pre_deploy_*.sql.gz | tail -n +11 | xargs -r rm

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            code=$(curl -s -o /dev/null -w '%{http_code}' https://cb.hexbolttechnologies.in/health)
            test "$code" = "200" || { echo "Health check failed: HTTP $code"; exit 1; }
            echo "Health OK ($code)"

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -f -X POST -H 'Content-type: application/json' --data "{
            \"text\": \":white_check_mark: Chatbot deploy succeeded for \`${GITHUB_SHA:0:7}\` by ${GITHUB_ACTOR}\n<https://cb.hexbolttechnologies.in|Site> | <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}|Commit> | <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|Run>\"
          }" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -f -X POST -H 'Content-type: application/json' --data "{
            \"text\": \":x: Chatbot deploy FAILED for \`${GITHUB_SHA:0:7}\` by ${GITHUB_ACTOR}\n<${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View logs>\"
          }" "$SLACK_WEBHOOK_URL"
